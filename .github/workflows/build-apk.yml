name: Build AuraScribe Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      working-directory: android-app
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x android-app/gradlew

    - name: Build Debug APK
      working-directory: android-app
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Check APK exists
      run: ls -la android-app/app/build/outputs/apk/debug/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraScribe-Pro-APK
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
